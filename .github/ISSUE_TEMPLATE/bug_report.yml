name: Bug Report
description: File a bug report to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: 1. Reproduction Steps
      description: |
        How do we trigger this bug? Please provide as much detail as possible.
      placeholder: |
        1. Open the app
        2. Go to '...'
        3. Click '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: version
    attributes:
      label: Version
      description: |
        What version of FinWise are you using?
      placeholder: v0.7.0
    validations:
      required: true
